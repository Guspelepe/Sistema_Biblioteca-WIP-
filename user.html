                <span class="user-apelido" id="user-apelido"></span>

            <nav class="menu-user">
                <ul>
                    <li><a href="#" data-section="inicio" class="active">Página Inicial</a></li>
                    <li><a href="#" data-section="perfil">Perfil</a></li>
                    <li><a href="#" data-section="biblioteca">Biblioteca</a></li>
                    <li><a href="#" data-section="meus-livros">Meus Livros</a></li>
                    <li><a href="#" data-section="solicitar-livros">Solicitar Livros</a></li>
                    <li><a href="#" data-section="editar-perfil">Editar Perfil</a></li>
                    <li><a href="#" id="logout-user">Sair</a></li>
                </ul>
            </nav>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="main-user">
            <header class="topbar-user">
                <h1 id="section-title-user">Página Inicial</h1>
                <div class="topbar-actions-user"></div>
            </header>
            <div class="content-user" id="content-user">
                <p>Bem-vindo! Selecione uma opção no menu.</p>
            </div>

                    <span class="github-icon"></span> GitHub
                </a>

            </div>
        </div>

    <!-- NOTIFICAÇÃO -->
    <div id="notificacao-user" class="notificacao-user" style="display:none;"></div>
