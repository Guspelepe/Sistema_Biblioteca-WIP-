<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Usuário</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #2c3e50; }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 Olá, <span id="nome-usuario"></span>!</h1>
        <p>Bem-vindo ao painel do usuário.</p>
        <p style="color: #888; font-size: 0.9rem;">Em breve com todas as funcionalidades.</p>
        <button onclick="logout()">Sair</button>
    </div>

    <script>
        // Verifica se o usuário está logado
        if (sessionStorage.getItem('perfil') !== 'usuario') {
            window.location.href = 'index.html';
        }
        document.getElementById('nome-usuario').textContent = sessionStorage.getItem('usuario');

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
