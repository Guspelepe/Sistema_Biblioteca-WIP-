<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Acesso</title>
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style-landing.css">
</head>
<body>
    <div class="landing-container">
        <!-- Coluna da imagem (esquerda) -->
        <div class="col-imagem" id="col-imagem">
            <img id="imagem-destaque" src="" alt="Leitor">
            <div class="frase-container">
                <p id="frase-destaque"></p>
            </div>
        </div>
        <!-- Coluna do formulário (direita) -->
        <div class="col-form">
            <div class="card">
                <h1><span>Biblioteca</span></h1>
                <p class="subtitulo">Digite suas credenciais para acessar</p>

                <form id="login-form">
                    <div class="campo">
                        <label for="identificador">Usuário (nick, nome ou CPF)</label>
                        <input type="text" id="identificador" placeholder="Digite seu usuário, nick ou CPF" required>
                    </div>
                    <div class="campo">
                        <label for="senha">Senha</label>
                        <div class="senha-wrapper">
                            <input type="password" id="senha" placeholder="Digite sua senha" required>
                            <button type="button" class="btn-mostrar-senha" onclick="toggleSenha('senha', this)">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-entrar">Entrar</button>
                </form>

                <div id="erro" style="display: none;">Credenciais inválidas. Tente novamente.</div>

                <button type="button" class="btn-registrar" id="btn-abrir-registro">Ainda não tem conta? Registre-se</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL DE REGISTRO ===== -->
    <div class="modal-overlay" id="modal-registro">
        <div class="modal-content">
            <button class="fechar" id="btn-fechar-registro">&times;</button>
            <h2>📝 <span>Criar conta</span></h2>
            <p class="subtitulo-modal">Preencha os dados para se cadastrar</p>

            <form id="form-registro">
                <div class="campo">
                    <label for="reg-nome">Nome completo</label>
                    <input type="text" id="reg-nome" placeholder="Ex: Maria Silva" required>
                </div>
                <div class="campo">
                    <label for="reg-nick">Apelido (nick)</label>
                    <input type="text" id="reg-nick" placeholder="Ex: Mari" required>
                </div>
                <div class="campo">
                    <label for="reg-cpf">CPF</label>
                    <input type="text" id="reg-cpf" placeholder="000.000.000-00" required maxlength="14" oninput="mascararCPF(this)">
                </div>
                <div class="campo">
                    <label for="reg-senha">Senha</label>
                    <div class="senha-wrapper">
                        <input type="password" id="reg-senha" placeholder="Mínimo 4 caracteres" required>
                        <button type="button" class="btn-mostrar-senha" onclick="toggleSenha('reg-senha', this)">👁️</button>
                    </div>
                </div>
                <div class="campo">
                    <label for="reg-foto">URL da foto (opcional)</label>
                    <input type="url" id="reg-foto" placeholder="https://exemplo.com/foto.jpg">
                </div>
                <button type="submit" class="btn-primario">Registrar</button>
                <div id="erro-registro" style="display: none;"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.3/dist/dexie.js"></script>
    <script src="static/js/db.js"></script>
    <script src="static/js/landing.js"></script>
    
</body>
</html>
